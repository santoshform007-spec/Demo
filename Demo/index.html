<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complaints Portal</title>
    <meta name="description" content="View and manage user complaints.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">Complaint<span class="highlight">Portal</span></a>
            <ul class="nav-links">
                <li><a href="index.html" class="active">All Complaints</a></li>
                <li><a href="add-complaint.html" class="btn-nav">Register Complaint</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <header class="page-header">
            <h1>Recent Complaints</h1>
            <p>Review the latest feedback and issues submitted by users.</p>
        </header>

        <div id="complaints-list" class="complaints-grid">
            <!-- Complaints will be injected here by JS -->
        </div>
        
        <div id="empty-state" class="empty-state hidden">
            <svg class="empty-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
            <h2>No Complaints Yet</h2>
            <p>There are currently no complaints registered in the system.</p>
            <a href="add-complaint.html" class="btn-primary mt-4">File a Complaint</a>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2026 ComplaintPortal. All rights reserved.</p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
